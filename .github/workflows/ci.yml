name: Baa CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Add bundled toolchain to PATH (if present)
        shell: pwsh
        run: |
          if (Test-Path ".\gcc\bin") {
            "$env:GITHUB_WORKSPACE\gcc\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
      - name: Configure (Windows MinGW)
        shell: pwsh
        run: cmake -B build -G "MinGW Makefiles"
      - name: Build
        shell: pwsh
        run: cmake --build build

  quick-windows:
    runs-on: windows-latest
    needs: build-windows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Add bundled toolchain to PATH (if present)
        shell: pwsh
        run: |
          if (Test-Path ".\gcc\bin") {
            "$env:GITHUB_WORKSPACE\gcc\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
      - name: Configure (Windows MinGW)
        shell: pwsh
        run: cmake -B build -G "MinGW Makefiles"
      - name: Build
        shell: pwsh
        run: cmake --build build
      - name: QA Quick
        shell: pwsh
        env:
          PYTHONUTF8: "1"
        run: python scripts/qa_run.py --mode quick --summary-json qa-summary-quick-windows.json
      - name: Upload QA artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qa-windows-quick-artifacts
          if-no-files-found: ignore
          path: |
            .baa_qa_logs/**
            qa-summary-quick-windows.json
            build/**/*.s
            build/**/*.ir

  full-windows:
    runs-on: windows-latest
    needs: quick-windows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Add bundled toolchain to PATH (if present)
        shell: pwsh
        run: |
          if (Test-Path ".\gcc\bin") {
            "$env:GITHUB_WORKSPACE\gcc\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
      - name: Configure (Windows MinGW)
        shell: pwsh
        run: cmake -B build -G "MinGW Makefiles"
      - name: Build
        shell: pwsh
        run: cmake --build build
      - name: QA Full
        shell: pwsh
        env:
          PYTHONUTF8: "1"
        run: python scripts/qa_run.py --mode full --summary-json qa-summary-full-windows.json
      - name: Upload QA artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qa-windows-full-artifacts
          if-no-files-found: ignore
          path: |
            .baa_qa_logs/**
            qa-summary-full-windows.json
            build/**/*.s
            build/**/*.ir

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Configure (Linux)
        run: cmake -B build-linux -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build-linux -j

  quick-linux:
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Configure (Linux)
        run: cmake -B build-linux -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build-linux -j
      - name: QA Quick
        env:
          PYTHONUTF8: "1"
        run: python3 scripts/qa_run.py --mode quick --summary-json qa-summary-quick-linux.json
      - name: Upload QA artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qa-linux-quick-artifacts
          if-no-files-found: ignore
          path: |
            .baa_qa_logs/**
            qa-summary-quick-linux.json
            build-linux/**/*.s
            build-linux/**/*.ir

  full-linux:
    runs-on: ubuntu-latest
    needs: quick-linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Configure (Linux)
        run: cmake -B build-linux -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build-linux -j
      - name: QA Full
        env:
          PYTHONUTF8: "1"
        run: python3 scripts/qa_run.py --mode full --summary-json qa-summary-full-linux.json
      - name: Upload QA artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qa-linux-full-artifacts
          if-no-files-found: ignore
          path: |
            .baa_qa_logs/**
            qa-summary-full-linux.json
            build-linux/**/*.s
            build-linux/**/*.ir
