name: Baa CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Add bundled toolchain to PATH (if present)
        shell: pwsh
        run: |
          if (Test-Path ".\gcc\bin") {
            "$env:GITHUB_WORKSPACE\gcc\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
      - name: Configure (Windows MinGW)
        shell: pwsh
        run: cmake --preset windows-release
      - name: Build
        shell: pwsh
        run: cmake --build --preset windows-release

  quick-windows:
    runs-on: windows-latest
    needs: build-windows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Add bundled toolchain to PATH (if present)
        shell: pwsh
        run: |
          if (Test-Path ".\gcc\bin") {
            "$env:GITHUB_WORKSPACE\gcc\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
      - name: Configure (Windows MinGW)
        shell: pwsh
        run: cmake --preset windows-release
      - name: Build
        shell: pwsh
        run: cmake --build --preset windows-release
      - name: QA Quick
        shell: pwsh
        env:
          PYTHONUTF8: "1"
        run: python scripts/qa_run.py --mode quick --summary-json qa-summary-quick-windows.json
      - name: Upload QA artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qa-windows-quick-artifacts
          if-no-files-found: ignore
          path: |
            .baa_qa_logs/**
            qa-summary-quick-windows.json
            build/**/*.s
            build/**/*.ir

  full-windows:
    runs-on: windows-latest
    needs: quick-windows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Add bundled toolchain to PATH (if present)
        shell: pwsh
        run: |
          if (Test-Path ".\gcc\bin") {
            "$env:GITHUB_WORKSPACE\gcc\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
      - name: Configure (Windows MinGW)
        shell: pwsh
        run: cmake --preset windows-verify
      - name: Build
        shell: pwsh
        run: cmake --build --preset windows-verify
      - name: Module Size Guard
        shell: pwsh
        env:
          PYTHONUTF8: "1"
        run: python scripts/check_module_sizes.py --json-out module-size-full-windows.json
      - name: Incremental Build Validation
        shell: pwsh
        env:
          PYTHONUTF8: "1"
        run: python scripts/check_incremental_build.py --preset windows-verify --json-out incremental-full-windows.json
      - name: Reproducibility Check
        shell: pwsh
        env:
          PYTHONUTF8: "1"
        run: python scripts/check_reproducibility.py --preset windows-verify --json-out reproducibility-full-windows.json
      - name: QA Full
        shell: pwsh
        env:
          PYTHONUTF8: "1"
        run: python scripts/qa_run.py --mode full --summary-json qa-summary-full-windows.json
      - name: Upload QA artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qa-windows-full-artifacts
          if-no-files-found: ignore
          path: |
            .baa_qa_logs/**
            incremental-full-windows.json
            module-size-full-windows.json
            qa-summary-full-windows.json
            reproducibility-full-windows.json
            build/**/*.s
            build/**/*.ir
            build-verify/**/*.s
            build-verify/**/*.ir

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Configure (Linux)
        run: cmake --preset linux-release
      - name: Build
        run: cmake --build --preset linux-release

  quick-linux:
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Configure (Linux)
        run: cmake --preset linux-release
      - name: Build
        run: cmake --build --preset linux-release
      - name: QA Quick
        env:
          PYTHONUTF8: "1"
        run: python3 scripts/qa_run.py --mode quick --summary-json qa-summary-quick-linux.json
      - name: Upload QA artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qa-linux-quick-artifacts
          if-no-files-found: ignore
          path: |
            .baa_qa_logs/**
            qa-summary-quick-linux.json
            build-linux/**/*.s
            build-linux/**/*.ir

  full-linux:
    runs-on: ubuntu-latest
    needs: quick-linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Configure (Linux)
        run: cmake --preset linux-verify
      - name: Build
        run: cmake --build --preset linux-verify
      - name: Module Size Guard
        env:
          PYTHONUTF8: "1"
        run: python3 scripts/check_module_sizes.py --json-out module-size-full-linux.json
      - name: Incremental Build Validation
        env:
          PYTHONUTF8: "1"
        run: python3 scripts/check_incremental_build.py --preset linux-verify --json-out incremental-full-linux.json
      - name: Reproducibility Check
        env:
          PYTHONUTF8: "1"
        run: python3 scripts/check_reproducibility.py --preset linux-verify --json-out reproducibility-full-linux.json
      - name: QA Full
        env:
          PYTHONUTF8: "1"
        run: python3 scripts/qa_run.py --mode full --summary-json qa-summary-full-linux.json
      - name: Upload QA artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qa-linux-full-artifacts
          if-no-files-found: ignore
          path: |
            .baa_qa_logs/**
            incremental-full-linux.json
            module-size-full-linux.json
            qa-summary-full-linux.json
            reproducibility-full-linux.json
            build-linux/**/*.s
            build-linux/**/*.ir
            build-linux-verify/**/*.s
            build-linux-verify/**/*.ir
