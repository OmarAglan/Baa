name: Baa Release Candidate

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: baa-release-candidate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Add bundled toolchain to PATH (if present)
        shell: pwsh
        run: |
          if (Test-Path ".\gcc\bin") {
            "$env:GITHUB_WORKSPACE\gcc\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
      - name: Configure strict Windows C reference build
        run: cmake --preset windows-verify
      - name: Clean strict Windows build
        run: cmake --build --preset windows-verify --clean-first
      - name: Windows quick QA
        env:
          PYTHONUTF8: "1"
        run: python scripts/qa_run.py --mode quick --summary-json qa-summary-quick-windows.json
      - name: Windows full QA
        env:
          PYTHONUTF8: "1"
        run: python scripts/qa_run.py --mode full --summary-json qa-summary-full-windows.json
      - name: Windows stress QA
        env:
          PYTHONUTF8: "1"
        run: python scripts/qa_run.py --mode stress --summary-json qa-summary-stress-windows.json
      - name: Windows release QA
        env:
          PYTHONUTF8: "1"
        run: python scripts/qa_run.py --mode release --summary-json qa-summary-release-windows.json
      - name: Upload Windows release receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-release-windows-${{ github.run_id }}
          if-no-files-found: error
          path: |
            .baa_qa_logs/**
            qa-summary-quick-windows.json
            qa-summary-full-windows.json
            qa-summary-stress-windows.json
            qa-summary-release-windows.json

  release-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Configure strict Linux C reference build
        run: cmake --preset linux-verify
      - name: Clean strict Linux build
        run: cmake --build --preset linux-verify --clean-first -j
      - name: Linux quick QA
        env:
          PYTHONUTF8: "1"
        run: python3 scripts/qa_run.py --mode quick --summary-json qa-summary-quick-linux.json
      - name: Linux full QA
        env:
          PYTHONUTF8: "1"
        run: python3 scripts/qa_run.py --mode full --summary-json qa-summary-full-linux.json
      - name: Linux stress QA
        env:
          PYTHONUTF8: "1"
        run: python3 scripts/qa_run.py --mode stress --summary-json qa-summary-stress-linux.json
      - name: Linux release QA
        env:
          PYTHONUTF8: "1"
        run: python3 scripts/qa_run.py --mode release --summary-json qa-summary-release-linux.json
      - name: Upload Linux release receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-release-linux-${{ github.run_id }}
          if-no-files-found: error
          path: |
            .baa_qa_logs/**
            qa-summary-quick-linux.json
            qa-summary-full-linux.json
            qa-summary-stress-linux.json
            qa-summary-release-linux.json
